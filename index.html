<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Masuk Barang SKU</title>
    <!-- Memanggil CSS Eksternal (Jika ada, tetap dipertahankan) -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Desain tambahan agar bingkai kamera responsif mengikuti mode landscape 16:9 */
        .reader-frame {
            width: 100%;
            height: auto; /* Mengikuti rasio aspek kamera secara dinamis */
            min-height: auto; 
            margin: 18px 0 0;
            background: #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #d1d5db;
        }
        
        #reader {
            width: 100%;
            background: #000;
        }

        /* Merapikan tampilan tombol dan form */
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            margin-top: 10px;
        }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-secondary { background-color: #4b5563; color: white; }
        
        #show, #detail-form {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background-color: #f9fafb;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: 0 auto; padding: 20px; font-family: sans-serif;">
        <h2>Scanner Barcode Produk</h2>
        <p id="status" style="color: #6b7280;">Kamera belum aktif.</p>
        
        <button id="btn-scan" class="btn btn-primary" onclick="toggleScanner()">Mulai Scan</button>

        <!-- Bingkai area kamera -->
        <div class="reader-frame">
            <div id="reader"></div>
        </div>

        <!-- Bagian untuk menampilkan hasil pemindaian langsung -->
        <div id="show" style="display: none;">
            <h3>Hasil Scan:</h3>
            <p id="result" style="font-size: 20px; font-weight: bold; color: #10b981; word-break: break-all;"></p>
        </div>

        <!-- Form detail input barang masuk -->
        <div id="detail-form" style="display: none;">
            <h3 id="form-title">Detail Barang Masuk</h3>
            <div class="form-group">
                <label for="nama">Nama Produk:</label>
                <input type="text" id="nama" placeholder="Contoh: Indomie Goreng Aceh">
            </div>
            <div class="form-group">
                <label for="kategori">Kategori:</label>
                <input type="text" id="kategori" placeholder="Contoh: Makanan Instan">
            </div>
            <div class="form-group">
                <label for="harga">Harga Produk (Rp):</label>
                <input type="number" id="harga" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="stok">Jumlah Stok Masuk:</label>
                <input type="number" id="stok" value="1" min="1">
            </div>
            <button class="btn btn-primary" onclick="simpanKeSku()">Simpan ke SKU</button>
        </div>
    </div>

    <!-- Menghubungkan library inti qr.js (html5-qrcode) -->
    <script src="qr.js"></script>

    <script>
        const SUPABASE_URL = "https://brarwmuhcszekrellnkk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_O4TWch71_Vtcdagi-YFBpQ_YzggF6OD";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scanner = null;
        let isScanning = false;
        let scannedSku = "";
        let isNewProduct = false; // Penanda apakah produk baru atau lama

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        async function startScanner() {
            try {
                // Inisialisasi html5-qrcode pada elemen div #reader
                scanner = new Html5Qrcode('reader');
                
                // KONFIGURASI BARU: Dioptimalkan khusus untuk Landscape Barcode Produk
                const config = {
                    fps: 15, // Kecepatan tangkapan frame per detik (lebih responsif)
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        // Membuat kotak target berbentuk persegi panjang horizontal (landscape)
                        // Lebar kotak mengambil 85% area kamera, tinggi kotak mengambil 35% area kamera
                        const width = Math.floor(viewfinderWidth * 0.85);
                        const height = Math.floor(viewfinderHeight * 0.35);
                        
                        // Pembatasan ukuran minimum dan maksimum kotak target agar pas di layar HP
                        return {
                            width: width < 260 ? 260 : (width > 480 ? 480 : width),
                            height: height < 100 ? 100 : (height > 160 ? 160 : height)
                        };
                    },
                    aspectRatio: 1.777778, // Mengunci kamera ke rasio 16:9 widescreen (Landscape)
                    disableFlip: false
                };

                // Membuka kamera belakang HP
                await scanner.start({ facingMode: 'environment' }, config, onScanSuccess, onScanFailure);
                isScanning = true;
                document.getElementById('btn-scan').innerText = "Hentikan Kamera";
                document.getElementById('btn-scan').className = "btn btn-secondary";
                setStatus('Arahkan kotak landscape kamera tepat ke barcode produk.');
            } catch (err) {
                console.error(err);
                setStatus('Gagal mengakses kamera. Pastikan menggunakan HTTPS atau Localhost, serta beri izin kamera.');
            }
        }

        async function stopScanner() {
            if (scanner) {
                await scanner.stop();
                scanner = null;
            }
            isScanning = false;
            document.getElementById('btn-scan').innerText = "Mulai Scan";
            document.getElementById('btn-scan').className = "btn btn-primary";
            setStatus('Kamera dinonaktifkan.');
        }

        function toggleScanner() {
            if (isScanning) {
                stopScanner();
            } else {
                startScanner();
            }
        }

        // PERUBAHAN UTAMA 1: Mengubah fungsi menjadi async untuk cek database Supabase
        async function onScanSuccess(decodedText, decodedResult) {
            // Memutar efek suara beep pelan (opsional, sebagai penanda sukses)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e){}

            scannedSku = decodedText;
            
            // Menghentikan kamera otomatis demi menghemat baterai HP setelah sukses scan
            await stopScanner();
            setStatus('Memeriksa produk di database Supabase...');

            try {
                // Cek data produk berdasarkan id_produk (barcode)
                let { data: produk, error } = await supabaseClient
                    .from('produk')
                    .select('*')
                    .eq('id_produk', scannedSku)
                    .single();

                if (error && error.code !== 'PGRST116') { // PGRST116 artinya data tidak ditemukan (tidak masalah)
                    throw error;
                }

                // Memunculkan teks SKU dan Form Input
                document.getElementById('result').innerText = decodedText;
                document.getElementById('show').style.display = 'block';
                document.getElementById('detail-form').style.display = 'block';

                const namaInput = document.getElementById('nama');
                const kategoriInput = document.getElementById('kategori');
                const hargaInput = document.getElementById('harga');

                if (produk) {
                    // JIKA PRODUK SUDAH ADA (Tinggal tambah stok)
                    isNewProduct = false;
                    document.getElementById('form-title').innerText = "Detail Barang Masuk (Terdaftar)";
                    
                    // Isi data master dan kunci inputnya agar tidak sembarangan diubah oleh operator
                    namaInput.value = produk.nama;
                    namaInput.disabled = true;
                    kategoriInput.value = produk.kategori || "";
                    kategoriInput.disabled = true;
                    hargaInput.value = produk.harga || 0;
                    hargaInput.disabled = true;

                    setStatus('Produk ditemukan! Silakan masukkan jumlah kuantitas stok masuk.');
                } else {
                    // JIKA PRODUK BARU BELUM TERDAFTAR
                    isNewProduct = true;
                    document.getElementById('form-title').innerText = "Registrasi Produk Baru";
                    
                    // Reset input dan buka kuncinya agar bisa diisi manual
                    namaInput.value = "";
                    namaInput.disabled = false;
                    kategoriInput.value = "";
                    kategoriInput.disabled = false;
                    hargaInput.value = 0;
                    hargaInput.disabled = false;

                    setStatus('Barcode baru terdeteksi! Silakan lengkapi spesifikasi data produk baru.');
                }

            } catch (err) {
                console.error("Gagal memproses database:", err.message);
                setStatus('Gagal memproses database: ' + err.message);
            }
        }

        function onScanFailure(error) {
            // Diabaikan agar konsol browser tidak penuh saat proses pencarian kode berlangsung
        }

        // PERUBAHAN UTAMA 2: Mengubah fungsi simpan agar memproses data ke Supabase terlebih dahulu
        async function simpanKeSku() {
            const namaValue = document.getElementById('nama').value.trim();
            const kategoriValue = document.getElementById('kategori').value.trim();
            const hargaValue = parseFloat(document.getElementById('harga').value) || 0;
            const stokValue = parseInt(document.getElementById('stok').value) || 0;

            if (!scannedSku) {
                alert("Silakan lakukan scan barcode terlebih dahulu!");
                return;
            }
            if (!namaValue) {
                alert("Nama produk mohon diisi terlebih dahulu!");
                return;
            }

            try {
                if (isNewProduct) {
                    // Skenario A: Insert data produk baru ke Supabase
                    setStatus('Mendaftarkan produk baru ke cloud...');
                    const { error: insertError } = await supabaseClient
                        .from('produk')
                        .insert([
                            {
                                id_produk: scannedSku,
                                nama: namaValue,
                                kategori: kategoriValue,
                                harga: hargaValue,
                                stok: stokValue
                            }
                        ]);
                    if (insertError) throw insertError;
                } else {
                    // Skenario B: Ambil stok lama, jumlahkan, lalu update ke Supabase
                    setStatus('Memperbarui jumlah stok di database...');
                    let { data: produkLama } = await supabaseClient
                        .from('produk')
                        .select('stok')
                        .eq('id_produk', scannedSku)
                        .single();

                    const stokSekarang = produkLama ? produkLama.stok : 0;
                    const totalStokBaru = stokSekarang + stokValue;

                    const { error: updateError } = await supabaseClient
                        .from('produk')
                        .update({ stok: totalStokBaru })
                        .eq('id_produk', scannedSku);
                    if (updateError) throw updateError;
                }

                // Menyimpan sementara hasil input ke localStorage agar aman (sesuai kode asli Anda)
                localStorage.setItem('last_scanned_sku', scannedSku);
                localStorage.setItem('last_scanned_note', namaValue);
                localStorage.setItem('last_scanned_qty', stokValue);

                // Lepas kembali proteksi disabled sebelum beralih halaman
                document.getElementById('nama').disabled = false;
                document.getElementById('kategori').disabled = false;
                document.getElementById('harga').disabled = false;

                // Melakukan redirect balik ke index utama sembari membawa parameter data barang masuk
                const targetUrl = `../index.html?sku=${encodeURIComponent(scannedSku)}&note=${encodeURIComponent(namaValue)}&qty=${encodeURIComponent(stokValue)}`;
                window.location.href = targetUrl;

            } catch (err) {
                alert("Gagal menyimpan data ke Supabase: " + err.message);
                // Kembalikan status jika gagal
                setStatus('Gagal menyimpan data.');
            }
        }
    </script>
</body>
</html>
