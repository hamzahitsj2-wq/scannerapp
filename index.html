<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMMarket - Barcode Scanner Stok</title>
    <!-- Tailwind CSS untuk Tampilan Bagus di HP -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Library Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Library HTML5 QR/Barcode Scanner Resmi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-xl shadow-md p-4 mb-4">
        <h1 class="text-xl font-bold text-center text-blue-600 mb-2">SIMMarket Barcode Scanner</h1>
        <p class="text-xs text-gray-500 text-center mb-4">Gunakan kamera HP untuk input / tambah stok otomatis</p>
        
        <!-- Kotak Kamera Scanner -->
        <div id="reader" class="overflow-hidden rounded-lg border border-gray-300 bg-black"></div>
        
        <!-- Status Terakhir Scan -->
        <div id="scan-status" class="mt-4 p-3 bg-gray-50 rounded-lg text-sm text-center font-semibold text-gray-700">
            Siap memindai... Silakan arahkan kamera ke barcode produk.
        </div>
    </div>

    <!-- MODAL FORM INPUT BARANG BARU (Muncul jika barcode belum terdaftar) -->
    <div id="modal-barang-baru" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl p-5 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-800 mb-3">📦 Barcode Baru Terdeteksi!</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-semibold text-gray-500">ID / Barcode</label>
                    <input type="text" id="new-id" readonly class="w-full bg-gray-100 border p-2 rounded text-sm font-mono">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500">Nama Barang</label>
                    <input type="text" id="new-nama" placeholder="Contoh: Chiki Balls Cokelat" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500">Kategori</label>
                    <input type="text" id="new-kategori" placeholder="Contoh: Makanan / Minuman" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500">Harga Jual (Rp)</label>
                    <input type="number" id="new-harga" placeholder="3500" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500">Stok Awal (Qty)</label>
                    <input type="number" id="new-qty" value="1" class="w-full border p-2 rounded text-sm">
                </div>
            </div>

            <div class="flex space-x-2 mt-4">
                <button onclick="tutupModal()" class="flex-1 bg-gray-300 text-gray-700 p-2 rounded text-sm font-semibold">Batal</button>
                <button onclick="simpanBarangBaru()" class="flex-1 bg-blue-600 text-white p-2 rounded text-sm font-semibold hover:bg-blue-700">Simpan Ke Stok</button>
            </div>
        </div>
    </div>

    <script>
        // 1. KONFIGURASI SUPABASE (Ganti dengan data Anda)
        const SUPABASE_URL = "https://mqfaueuimoasxoijcrek.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZiA3fC0I5v_LPcliHXTnWQ_S6C2MZ5D";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isScanning = true; // Flag penahan delay agar tidak double scan dalam sedetik

        // 2. INISIALISASI SCANNER KAMERA
        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return; 
            isScanning = false; // Kunci scanner sebentar sewaktu memproses data

            document.getElementById("scan-status").innerHTML = `🔄 Memproses Barcode: <span class="font-mono text-blue-600">${decodedText}</span>`;
            
            // Jalankan fungsi pengecekan ke Supabase
            cekDanProsesBarcode(decodedText);
        }

        // 3. LOGIKA UTAMA: CEK KE DATABASE SUPABASE SIMMARKET
        async function cekDanProsesBarcode(barcodeId) {
            try {
                // Cari apakah ID Barcode sudah terdaftar di master_stok
                const { data: barang, error } = await supabase
                    .from('master_stok')
                    .select('*')
                    .eq('id', barcodeId)
                    .single();

                if (barang) {
                    // JIKA BARANG SUDAH ADA -> Omatiss Tambah Qty + 1 (Restock Instan)
                    const QtyBaru = barang.qty + 1;
                    
                    const { error: updateError } = await supabase
                        .from('master_stok')
                        .update({ qty: QtyBaru })
                        .eq('id', barcodeId);

                    if (!updateError) {
                        document.getElementById("scan-status").innerHTML = `✅ <b>${barang.nama}</b> ditemukan! Stok ditambah menjadi <b>${QtyBaru}</b>`;
                    }
                    
                    // Reset scanner setelah 2 detik untuk scan barang berikutnya
                    setTimeout(() => { isScanning = true; }, 2000);

                } else {
                    // JIKA BARANG BELUM ADA -> Buka Modal Input Barang Baru
                    document.getElementById("scan-status").innerHTML = `⚠️ Barcode belum terdaftar. Silakan isi form.`;
                    bukaModalBarangBaru(barcodeId);
                }

            } catch (err) {
                console.error(err);
                isScanning = true;
            }
        }

        // 4. FUNGSI UNTUK MENANGANI BARANG BARU (INPUT OTOMATIS)
        function bukaModalBarangBaru(barcodeId) {
            document.getElementById("new-id").value = barcodeId;
            document.getElementById("new-nama").value = "";
            document.getElementById("new-harga").value = "";
            document.getElementById("modal-barang-baru").classList.remove("hidden");
        }

        function tutupModal() {
            document.getElementById("modal-barang-baru").classList.add("hidden");
            isScanning = true; // Aktifkan kamera kembali
        }

        async function simpanBarangBaru() {
            const id = document.getElementById("new-id").value;
            const nama = document.getElementById("new-nama").value;
            const kategori = document.getElementById("new-kategori").value;
            const harga = parseInt(document.getElementById("new-harga").value) || 0;
            const qty = parseInt(document.getElementById("new-qty").value) || 0;

            if (!nama) { alert("Nama barang wajib diisi!"); return; }

            // Insert ke tabel master_stok Anda
            const { error } = await supabase
                .from('master_stok')
                .insert([{ id, nama, kategori, harga, qty }]);

            if (!error) {
                document.getElementById("scan-status").innerHTML = `🎉 Berhasil mendaftarkan <b>${nama}</b> ke SIMMarket!`;
                tutupModal();
            } else {
                alert("Gagal menyimpan ke Supabase: " + error.message);
                isScanning = true;
            }
        }

        // 5. MENJALANKAN SCANNER (Mendukung Kamera Belakang HP secara otomatis)
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 280, height: 150 }, // Ukuran persegi panjang ideal untuk barcode batangan
            aspectRatio: 1.0 
        }, false);
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
