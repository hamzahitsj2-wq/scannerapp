<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Barcode SKU</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
        }
        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .scan-card {
            width: min(100%, 480px);
            background: #111827;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.25);
        }
        .reader-frame {
            width: 100%;
            min-height: 320px;
            height: min(60vh, 420px);
            margin-top: 14px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #334155;
        }
        .reader-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }
        .reader-frame canvas {
            display: none;
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <section class="scan-card">
            <div class="card-header">
                <p class="eyebrow">SIM Market</p>
                <h1>Scan Barcode SKU</h1>
                <p id="status" class="status-text">Klik tombol untuk memulai kamera.</p>
            </div>

            <button id="start-btn" type="button">Mulai Kamera</button>
            <div id="reader" class="reader-frame"></div>

            <div id="show" class="result-box">
                <h4>Hasil Scan</h4>
                <p id="result"></p>
            </div>

            <div id="detail-form" class="detail-form">
                <p class="helper-text">Isi detail barang sebelum diteruskan ke aplikasi.</p>
                <label class="detail-field">
                    <span>Keterangan barang</span>
                    <input id="item-note" type="text" placeholder="Contoh: stok masuk dari supplier" />
                </label>
                <label class="detail-field">
                    <span>Jumlah barang masuk</span>
                    <input id="item-qty" type="number" min="1" value="1" />
                </label>
                <button id="save-scan-btn" type="button">Simpan ke SKU</button>
            </div>
        </section>
    </main>

    <script src="qr.js"></script>
    <script>
        const SUPABASE_URL = "https://mqfaueuimoasxoijcrek.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZiA3fC0I5v_LPcliHXTnWQ_S6C2MZ5D";
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const showEl = document.getElementById('show');
        const resultEl = document.getElementById('result');
        const detailFormEl = document.getElementById('detail-form');
        const itemNoteInput = document.getElementById('item-note');
        const itemQtyInput = document.getElementById('item-qty');
        const saveScanBtn = document.getElementById('save-scan-btn');
        let scanner = null;
        let isScanning = false;
        let lastScannedSku = '';

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.style.color = isError ? '#fda4af' : '#cbd5e1';
        }

        async function onScanSuccess(decodedText) {
            if (!decodedText) return;

            lastScannedSku = decodedText;
            showEl.style.display = 'block';
            detailFormEl.style.display = 'block';
            resultEl.textContent = decodedText;
            itemNoteInput.value = '';
            itemQtyInput.value = '1';
            localStorage.setItem('last_scanned_sku', decodedText);
            if (scanner) {
                try {
                    await scanner.stop();
                } catch (err) {
                    console.warn(err);
                }
            }
            setStatus('Barcode berhasil terbaca. Lengkapi data lalu simpan.');
        }

        function onScanFailure() {
            // biarkan kosong, agar pemindaian tetap berjalan
        }

        saveScanBtn.addEventListener('click', () => {
            const note = itemNoteInput.value.trim();
            const qty = parseInt(itemQtyInput.value, 10) || 1;
            const params = new URLSearchParams({
                sku: lastScannedSku,
                note,
                qty: String(qty)
            });

            localStorage.setItem('last_scanned_sku', lastScannedSku);
            localStorage.setItem('last_scanned_note', note);
            localStorage.setItem('last_scanned_qty', String(qty));
            window.location.href = '../index.html?' + params.toString();
        });

        function applyReaderLayout() {
            const readerEl = document.getElementById('reader');
            if (!readerEl) return;
            readerEl.style.width = '100%';
            readerEl.style.minHeight = '320px';
            readerEl.style.height = 'min(60vh, 420px)';
            readerEl.style.borderRadius = '16px';
            readerEl.style.overflow = 'hidden';
            readerEl.style.background = '#000';
            readerEl.style.display = 'flex';
            readerEl.style.alignItems = 'center';
            readerEl.style.justifyContent = 'center';
            const videoEl = readerEl.querySelector('video');
            if (videoEl) {
                videoEl.style.width = '100%';
                videoEl.style.height = '100%';
                videoEl.style.objectFit = 'cover';
            }
        }

        async function startScanner() {
            if (isScanning) return;

            if (!window.Html5Qrcode) {
                setStatus('Pustaka scanner tidak tersedia.', true);
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('Browser ini tidak mendukung akses kamera.', true);
                return;
            }

            const isSecureContext = window.isSecureContext || window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isSecureContext) {
                setStatus('Buka halaman lewat server lokal seperti http://localhost:8000 agar kamera aktif.', true);
                return;
            }

            startBtn.disabled = true;
            startBtn.textContent = 'Memulai...';
            setStatus('Meminta akses kamera...');

            try {
                if (scanner) {
                    try { await scanner.stop(); } catch (stopErr) { console.warn(stopErr); }
                    try { await scanner.clear(); } catch (clearErr) { console.warn(clearErr); }
                }

                applyReaderLayout();
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    disableFlip: false
                };

                const attempts = [
                    { facingMode: { ideal: 'environment' } },
                    { facingMode: 'environment' },
                    { facingMode: 'user' }
                ];

                let lastError = null;
                for (const constraints of attempts) {
                    try {
                        const candidateScanner = new Html5Qrcode('reader');
                        await candidateScanner.start(constraints, config, onScanSuccess, onScanFailure);
                        scanner = candidateScanner;
                        isScanning = true;
                        setStatus('Arahkan kamera ke barcode.');
                        setTimeout(applyReaderLayout, 250);
                        return;
                    } catch (err) {
                        lastError = err;
                        try { await scanner?.stop(); } catch (stopErr) { console.warn(stopErr); }
                        try { await scanner?.clear(); } catch (clearErr) { console.warn(clearErr); }
                    }
                }

                throw lastError || new Error('Tidak bisa membuka kamera.');
            } catch (err) {
                console.error(err);
                setStatus('Gagal membuka kamera: ' + (err?.message || err), true);
                if (scanner) {
                    try {
                        await scanner.clear();
                    } catch (clearErr) {
                        console.warn(clearErr);
                    }
                }
                scanner = null;
                isScanning = false;
            } finally {
                startBtn.disabled = false;
                startBtn.textContent = 'Mulai Kamera';
            }
        }

        startBtn.addEventListener('click', () => {
            startScanner();
        });

        window.addEventListener('load', () => {
            startScanner();
        });
    </script>
</body>
</html>
